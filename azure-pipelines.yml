trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: 'mac-local-pool'

strategy:
  matrix:
    Python311:
      python.version: '3.11'
      python.executable: '/opt/homebrew/bin/python3.11'
    Python312:
      python.version: '3.12'
      python.executable: '/opt/homebrew/bin/python3.12'

steps:
- script: |
    $(python.executable) -m venv venv_$(python.version)
    source venv_$(python.version)/bin/activate
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Set up venv and install dependencies'

- script: |
    source venv_$(python.version)/bin/activate
    pytest tests/ --cov=core --cov-report=xml --cov-report=html --junitxml=test-results.xml -v
  displayName: 'Run tests with coverage'

- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFiles: '**/test-results.xml'
    testRunTitle: 'Publish test results for Python $(python.version)'

- task: PublishCodeCoverageResults@2
  inputs:
    summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
  displayName: 'Publish coverage report'